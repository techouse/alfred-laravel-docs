name: laravel_docs_alfred_workflow
description: Search the Laravel documentation using Alfred

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 2.2.5

environment:
  sdk: ^3.10.0

dependencies:
  alfred_workflow: ^1.2.4
  algoliasearch: ^1.47.1
  args: ^2.7.0
  cli_script: ^1.0.0
  envied: ^1.3.4
  html_unescape: ^2.0.0
  json_annotation: ^4.11.0
  recase: ^4.1.0

dev_dependencies:
  build_runner: ^2.13.1
  envied_generator: ^1.3.4
  json_serializable: ^6.13.1
  lints: ^6.1.0
